eureka:
  instance:
    hostname: {EUREKA_INSTANCE_HOSTNAME}
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: {EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: {JWT_ISSUER_URI}
  kafka:
    bootstrap-servers: {KAFKA_BOOTSTRAP_SERVERS}
  mail:
    host: {MAIL_HOST}
    port: {MAIL_PORT}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

twilio:
  account:
    sid: {TWILIO_ACCOUNT_SID}
    token: {TWILIO_ACCOUNT_TOKEN}
  phone:
    number: {TWILIO_PHONE_NUMBER}

keycloak:
  jwks-certs: {KEYCLOAK_JWKS_CERTS}