server:
  port: 9191

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /aggregate/auth-service/v3/api-docs
      - name: user-service
        url: /aggregate/user-service/v3/api-docs
      - name: account-service
        url: /aggregate/account-service/v3/api-docs
      - name: card-service
        url: /aggregate/card-service/v3/api-docs
      - name: transaction-service
        url: /aggregate/transaction-service/v3/api-docs
      - name: payment-service
        url: /aggregate/payment-service/v3/api-docs
      - name: loan-service
        url: /aggregate/loan-service/v3/api-docs
      - name: admin-service
        url: /aggregate/admin-service/v3/api-docs
      - name: notification-service
        url: /aggregate/notification-service/v3/api-docs
      - name: document-service
        url: /aggregate/document-service/v3/api-docs

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/master
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

resilience4j:
  retry:
    configs:
      default:
        wait-duration: 2s
        max-attempts: 3
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        wait-duration-in-open-state: 5000ms
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    configs:
      default:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  endpoint:
    health:
      show-details: always
      access: unrestricted
    circuitbreakers:
      enabled: true
debug: true
