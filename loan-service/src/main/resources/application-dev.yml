eureka:
  instance:
    hostname: {EUREKA_INSTANCE_HOSTNAME}
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: {EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: {JWT_ISSUER_URI}
  kafka:
    bootstrap-servers: {KAFKA_BOOTSTRAP_SERVERS}

  datasource:
    url: {POSTGRES_DB_URL}
    username: {POSTGRES_PG_USERNAME}
    password: {POSTGRES_PG_PASSWORD}
    driver-class-name: {POSTGRES_PG_DRIVER}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: {HIBERNATE_DIALECT}
  cassandra:
    contact-points: {CASSANDRA_CONTACT_POINTS}
    local-datacenter: {CASSANDRA_LOCAL_DATACENTER}
    keyspace-name: {CASSANDRA_KEYSPACE_NAME}

minio:
  bucket:
    name: {MINIO_BUCKET_NAME}
  url: {MINIO_URL}
  root-user: {MINIO_ROOT_USER}
  root-password: {MINIO_ROOT_PASSWORD}

keycloak:
  jwks-certs: {KEYCLOAK_JWKS_CERTS}