spring:
  config:
    import: vault://secret/prod/loan-service
  cloud:
    vault:
      uri: https://vault:8200
      authentication: kubernetes
      kubernetes:
        role: loan-service-prod
        service-account-token-file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kv:
        enabled: true
        backend: secret
        application-name: prod/loan-service
      enabled: true