apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service
  namespace: onlineakimbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-service
  template:
    metadata:
      labels:
        app: loan-service
    spec:
      initContainers:
        - name: wait-for-eureka
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - 'until curl -s http://eureka-server:8761/eureka/apps > /dev/null; do echo "Waiting for Eureka Server..."; sleep 5; done'
      containers:
        - name: loan-service
          imagePullPolicy: Always
          image: ghcr.io/akim1001/onlineakimbank/loan-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
  namespace: onlineakimbank
spec:
  selector:
    app: loan-service
  ports:
    - port: 8086
      targetPort: 8086
