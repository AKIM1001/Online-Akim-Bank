apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cassandra-pvc
  namespace: onlineakimbank
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: cassandra-creds
  namespace: onlineakimbank
type: Opaque
stringData:
  username: "cassandra"
  password: "cassandra"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-init
  namespace: onlineakimbank
data:
  init.cql: |
    CREATE KEYSPACE IF NOT EXISTS character_data
    WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};

    CREATE KEYSPACE IF NOT EXISTS comment_data
    WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};

    CREATE KEYSPACE IF NOT EXISTS thread_data
    WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};

    CREATE KEYSPACE IF NOT EXISTS user_media
    WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra
  namespace: fablewhirl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "fablewhirl-cluster"
            - name: CASSANDRA_DC
              value: "datacenter1"
            - name: CASSANDRA_RACK
              value: "rack1"
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
            - name: cassandra-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - cqlsh
                - -e
                - "DESCRIBE KEYSPACES;"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: cassandra-data
          persistentVolumeClaim:
            claimName: cassandra-pvc
        - name: cassandra-init
          configMap:
            name: cassandra-init
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: onlineakimbank
spec:
  selector:
    app: cassandra
  ports:
    - port: 9042
      targetPort: 9042
  type: ClusterIP